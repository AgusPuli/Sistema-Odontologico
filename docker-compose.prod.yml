# Production overlay. Use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# All secrets MUST be provided via environment variables (.env file or
# orchestrator secrets). No defaults are shipped here on purpose.

services:
  postgres:
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports: []  # Not exposed publicly in prod

  pgadmin:
    profiles: ["never"]  # Disabled in prod

  minio:
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports: []  # Not exposed publicly; reverse-proxy if needed

  backend:
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      SWAGGER_ENABLED: "false"
    restart: unless-stopped
