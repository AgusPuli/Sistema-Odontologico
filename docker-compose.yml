services:
  postgres:
    image: postgres:17-alpine
    container_name: odontograma-postgres
    environment:
      POSTGRES_DB: odontograma_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - odontograma-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d odontograma_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: odontograma-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@odontograma.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    networks:
      - odontograma-network
    depends_on:
      - postgres

  minio:
    image: minio/minio:latest
    container_name: odontograma-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - odontograma-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: odontograma-backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DATABASE_URL: jdbc:postgresql://postgres:5432/odontograma_db
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      JWT_SECRET: c2VjcmV0LWtleS1mb3ItZGV2ZWxvcG1lbnQtbXVzdC1iZS1hdC1sZWFzdC01MTItYml0cy1vcg==
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - odontograma-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

volumes:
  postgres_data:
  minio_data:

networks:
  odontograma-network:
    driver: bridge
